name: zatyatflutter
description: An RVM for recycling.

version: 1.0.1+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  ## Main packages
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  firebase_storage: ^12.2.0
  firebase_storage_web: ^3.9.13
  cloud_firestore: ^5.3.0
  firebase_app_check: ^0.3.0+5
  firebase_remote_config: ^5.1.0
  firebase_crashlytics: ^4.3.4
  shared_preferences: ^2.3.3
  flutter_widget_from_html: ^0.10.5+3
  googleapis: ^11.4.0
  google_sign_in: ^6.1.5
  extension_google_sign_in_as_googleapis_auth: ^2.0.11
  image_picker: ^1.0.7
  get_cli: ^1.8.1
  get: any
  getwidget: ^3.1.1
  syncfusion_flutter_calendar: ^28.2.11
  syncfusion_flutter_charts: ^28.2.11
  file_picker: ^9.2.1
  path_provider: ^2.1.2
  path: ^1.8.3
  universal_io: ^2.2.2
  http: ^1.2.2
  html_unescape: ^2.0.0
  qr_flutter: ^4.1.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.3.0

  ## Env packages
  cloud_functions: ^5.1.0
  geolocator: ^13.0.1
  google_maps_flutter: ^2.11.0

  ## Net packages
  firebase_analytics: ^11.3.0
  firebase_messaging: ^15.1.0
  intl: ^0.18.0
  intl_phone_field: ^3.2.0
  screenshot: ^2.5.0
  flutter_vector_icons: ^2.0.0
  carousel_slider: ^5.0.0
  flutterap_breadcrumb: ^1.0.12
  translator: ^1.0.0
  photo_view: ^0.15.0
  smooth_page_indicator: ^1.0.0+2
  google_fonts: ^4.0.4
  story_view: ^0.16.5
  url_launcher: ^6.1.12


  ## Possibly deleted packages
  mobx: ^2.1.0
  mobx_codegen: ^2.0.7+3
  flutter_mobx: ^2.0.6+4


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^1.0.0
  build_runner: ^2.3.3
  # flutter_launcher_icons: ^0.14.3
  # flutter_native_splash: ^2.4.4

flutter_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/images/app_icon.png" # Path to your app icon

flutter_native_splash:
  color: "#FFFFFF" # Background color for the splash screen
  image: "assets/images/lesserlogo1.png" # Path to your splash logo
  android: true # Enable for Android
  ios: true # Enable for iOS
  web: true # Enable for Web
  android_gravity: center # Center the logo on Android
  ios_content_mode: scaleAspectFit # Fit the logo on iOS
  web_image_mode: center # Center the logo on the web



# The following section is specific to Flutter.
